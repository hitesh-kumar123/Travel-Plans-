name: Conflict Checker

"on":
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check-conflicts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fetch main branch from base repo
        run: |
          git remote add base https://github.com/${{ github.repository }}
          git fetch base main

      - name: Detect merge conflicts
        id: detect_conflicts
        run: |
          set -e
          git merge --no-commit --no-ff base/main || true
          if git ls-files -u | grep -q .; then
            echo "conflict=true" >> $GITHUB_OUTPUT
          else
            echo "conflict=false" >> $GITHUB_OUTPUT
          fi

      - name: Add conflict label and comment
        if: steps.detect_conflicts.outputs.conflict == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = github.context.repo.owner;
            const repo = github.context.repo.repo;
            const issue_number = github.context.payload.pull_request.number;
            const label = 'conflicted';
            const commentBody = `<!-- conflict-checker -->
              👋 Hi @${github.context.payload.pull_request.user.login}!

              We detected that your Pull Request has **merge conflicts** with the main branch. ⚠️

              To resolve them:
              1. Sync your branch with the latest \`main\` branch:
                 \`\`\`bash
                 git checkout <your-branch-name>
                 git pull origin main
                 \`\`\`
              2. Resolve any conflicts in your editor.
              3. Commit and push the resolved changes:
                 \`\`\`bash
                 git add .
                 git commit -m "chore: resolve merge conflicts"
                 git push origin <your-branch-name>
                 \`\`\`

              Once the branch is conflict-free, this label will be removed automatically.
            `;

            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [label] });
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(c => c.body?.includes('<!-- conflict-checker -->') && c.user?.type === 'Bot');
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: commentBody });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: commentBody });
            }

      - name: Remove conflict label
        if: steps.detect_conflicts.outputs.conflict == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = github.context.repo.owner;
            const repo = github.context.repo.repo;
            const issue_number = github.context.payload.pull_request.number;
            const label = 'conflicted';
            try {
              await github.rest.issues.removeLabel({ owner, repo, issue_number, name: label });
            } catch (error) {
              if (error.status !== 404) throw error;
            }
